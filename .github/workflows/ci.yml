name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check Alembic migrations apply cleanly
        run: |
          alembic upgrade head
        env:
          DB_PATH: ci_migration_check.db
          SECRET_KEY: ci-only-secret-not-used-in-prod-padded-32b

      - name: Run tests with coverage (fails under 80%)
        run: pytest
        env:
          SECRET_KEY: ci-only-secret-not-used-in-prod-padded-32b
          XAI_API_KEY: test-key
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t job-tracker:ci .
