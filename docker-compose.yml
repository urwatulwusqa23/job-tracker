services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Persist SQLite data between docker restarts
      - job_data:/data
    env_file:
      - .env
    environment:
      - DB_PATH=/data/jobtracker.db
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  job_data:
